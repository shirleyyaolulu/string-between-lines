<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弦外之音人格测评</title>
<style>
:root {
  --bg: #0a0a0f;
  --card: #15151e;
  --card2: #1c1c2a;
  --primary: #a78bfa;
  --primary2: #c4b5fd;
  --accent: #f472b6;
  --accent2: #fb923c;
  --green: #34d399;
  --red: #f87171;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --border: #2a2a3d;
  --radius: 16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.container{max-width:680px;margin:0 auto;padding:16px;position:relative;z-index:1}
.page{display:none}.page.active{display:block;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Intro */
.intro{text-align:center;padding:48px 0 24px}
.intro .logo{font-size:64px;display:block;animation:float 3s ease-in-out infinite}
.intro h1{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:12px 0 4px}
.intro .sub{font-size:15px;color:var(--text2);margin-bottom:4px}
.intro .tag{font-size:11px;color:var(--primary);letter-spacing:3px;font-weight:600;margin-bottom:32px}
.intro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.intro-grid .gc{background:var(--card);border-radius:12px;padding:16px 12px;text-align:center;border:1px solid var(--border)}
.gc .gi{font-size:24px;margin-bottom:6px;display:block}
.gc .gt{font-size:13px;font-weight:700;color:var(--primary)}
.gc .gd{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5}
.info-box{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:24px;border:1px solid var(--border)}
.info-box h3{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:10px}
.info-box li{font-size:13px;color:var(--text2);line-height:1.7;padding:3px 0 3px 16px;position:relative;list-style:none}
.info-box li::before{content:'';position:absolute;left:0;top:10px;width:6px;height:6px;border-radius:50%;background:var(--primary)}
.btn{display:block;width:100%;padding:16px;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--primary),var(--accent));border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:1px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(167,139,250,.25)}
.btn:active{transform:translateY(0)}

/* Quiz */
.prog-bar{position:sticky;top:0;background:rgba(10,10,15,.92);backdrop-filter:blur(8px);padding:12px 0 10px;z-index:100}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-top span{font-size:12px;color:var(--text2)}
.prog-top .pn{color:var(--primary);font-weight:700}
.prog-track{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;transition:width .35s ease}
.q-card{background:var(--card);border-radius:var(--radius);padding:24px 20px;margin-bottom:16px;border:1px solid var(--border);animation:fadeUp .35s ease}
.q-cat{display:inline-block;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:700;margin-bottom:14px;letter-spacing:1px}
.cat-work{background:rgba(52,211,153,.12);color:var(--green)}.cat-love{background:rgba(244,114,182,.12);color:var(--accent)}.cat-family{background:rgba(251,146,60,.12);color:var(--accent2)}.cat-social{background:rgba(167,139,250,.12);color:var(--primary)}
.q-scene{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px;padding:12px;background:var(--card2);border-radius:10px;border-left:3px solid var(--primary)}
.q-quote{font-size:17px;font-weight:700;line-height:1.6;margin-bottom:6px;padding-left:14px;border-left:3px solid var(--accent)}
.q-ask{font-size:14px;color:var(--primary);margin-bottom:16px;font-weight:500}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:block;width:100%;padding:12px 14px;font-size:13px;color:var(--text);background:var(--card2);border:2px solid transparent;border-radius:10px;cursor:pointer;text-align:left;line-height:1.6;transition:all .15s;font-family:inherit}
.opt:hover{border-color:var(--primary);background:rgba(167,139,250,.08)}
.opt.sel{border-color:var(--primary);background:rgba(167,139,250,.12);font-weight:600}
.nav-row{display:flex;gap:10px;margin-top:6px}
.nav-btn{flex:1;padding:12px;font-size:14px;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:all .15s;font-family:inherit}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.nb-next{background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff}
.nb-next:hover:not(:disabled){box-shadow:0 4px 16px rgba(167,139,250,.3)}
.nb-prev{background:var(--card);color:var(--primary);border:1px solid var(--border)}

/* Result */
.r-hero{text-align:center;padding:36px 0 20px}
.r-emoji{font-size:56px;display:block;margin-bottom:8px;animation:float 2.5s ease-in-out infinite}
.r-badge{display:inline-block;padding:10px 28px;border-radius:24px;font-size:28px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;margin-bottom:12px;box-shadow:0 8px 24px rgba(167,139,250,.3)}
.r-title{font-size:20px;font-weight:900;margin-bottom:4px}
.r-sub{font-size:14px;color:var(--text2);margin-bottom:4px}
.r-rare{display:inline-block;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;background:rgba(251,146,60,.15);color:var(--accent2);animation:pulse 2s infinite;margin-bottom:24px}
.r-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid var(--border)}
.r-card h3{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:12px}
.r-card p{font-size:13px;line-height:1.8;color:var(--text2);margin-bottom:8px}
.r-card p:last-child{margin-bottom:0}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tag-item{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:600;background:rgba(167,139,250,.12);color:var(--primary)}

/* Radar chart */
.radar-wrap{position:relative;width:100%;max-width:320px;margin:0 auto 16px}
.radar-wrap canvas{width:100%!important;height:auto!important}

/* Dimension bars */
.dim-group{margin-bottom:12px}
.dim-group:last-child{margin-bottom:0}
.dim-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.dim-label span:first-child{color:var(--text2)}.dim-label span:last-child{color:var(--primary);font-weight:700}
.dim-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.dim-fill{height:100%;border-radius:3px;transition:width .8s ease}

/* Model scores */
.model-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.model-icon{font-size:20px;min-width:28px;text-align:center}
.model-info{flex:1}
.model-name{font-size:12px;font-weight:700;color:var(--text)}
.model-desc{font-size:11px;color:var(--text2)}
.model-bar{width:60px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.model-fill{height:100%;border-radius:3px}

.btn-outline{display:block;width:100%;padding:14px;font-size:15px;font-weight:700;color:var(--primary);background:transparent;border:2px solid var(--primary);border-radius:var(--radius);cursor:pointer;font-family:inherit;transition:all .2s;margin-top:10px}
.btn-outline:hover{background:var(--primary);color:#fff}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);color:var(--text);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:9999;transition:transform .3s;border:1px solid var(--border)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:480px){
  .container{padding:10px}
  .intro h1{font-size:26px}
  .intro .logo{font-size:48px}
  .intro-grid{grid-template-columns:1fr}
  .q-quote{font-size:15px}
  .r-badge{font-size:22px;padding:8px 20px}
}
</style>
</head>
<body>
<div class="container">

<!-- INTRO -->
<div class="page active" id="pg-intro">
  <div class="intro">
    <span class="logo">👂</span>
    <h1>弦外之音</h1>
    <div class="sub">你听得懂人话吗？</div>
    <div class="tag">SILLY BIG PERSONALITY TEST</div>
  </div>
  <div class="intro-grid">
    <div class="gc"><span class="gi">📡</span><div class="gt">感知力</div><div class="gd">你的天线灵不灵？</div></div>
    <div class="gc"><span class="gi">🧠</span><div class="gt">解码力</div><div class="gd">猜对了还是猜歪了？</div></div>
    <div class="gc"><span class="gi">💥</span><div class="gt">情绪反应</div><div class="gd">听完你炸不炸？</div></div>
    <div class="gc"><span class="gi">🎭</span><div class="gt">应对策略</div><div class="gd">你是装傻还是掀桌？</div></div>
  </div>
  <div class="info-box">
    <h3>这测试在测什么</h3>
    <ul>
      <li>40 个日常场景，看你能不能听出话里有话</li>
      <li>不是对错题——每个选项都暴露你的人格倾向</li>
      <li>15 个维度、5 大模型，最后匹配你的弦外之音人格</li>
      <li>16 种人格，从「聋者」到「大师」，总有一款适合你</li>
      <li>约 8 分钟，建议在没人打扰你的时候做</li>
    </ul>
  </div>
  <button class="btn" onclick="startQuiz()">开始测试</button>
</div>

<!-- QUIZ -->
<div class="page" id="pg-quiz">
  <div class="prog-bar">
    <div class="prog-top"><span id="p-cat">职场暗语</span><span class="pn" id="p-num">1/40</span></div>
    <div class="prog-track"><div class="prog-fill" id="p-fill" style="width:2.5%"></div></div>
  </div>
  <div id="q-area"></div>
  <div class="nav-row">
    <button class="nav-btn nb-prev" id="nb-prev" onclick="prevQ()" disabled>上一题</button>
    <button class="nav-btn nb-next" id="nb-next" onclick="nextQ()" disabled>下一题</button>
  </div>
</div>

<!-- RESULT -->
<div class="page" id="pg-result"><div id="r-area"></div></div>

</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// QUESTIONS - 40 scenarios, each option scores on 15 dimensions
// Dimensions: P1,P2,P3, D1,D2,D3, E1,E2,E3, R1,R2,R3, S1,S2,S3
// Score range per dimension per question: 0-3
// ============================================================
const Q = [
// ===== 职场 (10) =====
{cat:"work",catN:"职场暗语",
 scene:"周一开会，你提了一个方案。领导听完后说：",
 quote:"嗯，这个想法很大胆，你再想想。",
 ask:"你的第一反应是？",

  {t:"领导在夸我有创意，回去继续完善",s:{P1:0,P2:0,P3:0,D1:0,D2:0,D3:2,E1:3,E2:0,E3:0,R1:0,R2:0,R3:0,S1:0,S2:0,S3:0}},
  {t:"「大胆」不是好词，这方案基本被毙了",s:{P1:3,P2:2,P3:3,D1:3,D2:2,D3:0,E1:2,E2:1,E3:1,R1:0,R2:0,R3:0,S1:3,S2:0,S3:0}},
  {t:"听出来了但装没听懂，笑着说「好的领导我再优化」",s:{P1:3,P2:2,P3:2,D1:2,D2:2,D3:0,E1:3,E2:1,E3:0,R1:0,R2:3,R3:0,S1:3,S2:0,S3:0}},
  {t:"当场追问「您觉得哪里需要改？」把话挑明",s:{P1:2,P2:1,P3:2,D1:2,D2:1,D3:0,E1:2,E2:0,E3:0,R1:3,R2:0,R3:2,S1:2,S2:0,S3:0}}
 ]},
{cat:"work",catN:"职场暗语",
 scene:"你向同事请教问题，同事说：",
 quote:"这个嘛……你可以看看文档，写得挺清楚的。",
 ask:"你怎么理解？",
 opts:[
  {t:"文档确实有，谢谢提醒，去翻文档",s:{P1:0,P2:0,P3:0,D1:0,D2:0,D3:1,E1:3,E2:0,E3:0,R1:0,R2:0,R3:0,S1:0,S2:0,S3:0}},
  {t:"这是在嫌我问的问题太low了",s:{P1:3,P2:2,P3:2,D1:3,D2:1,D3:0,E1:1,E2:1,E3:2,R1:0,R2:0,R3:0,S1:3,S2:0,S3:0}},
  {t:"管TA什么意思，反正我继续问到懂为止",s:{P1:0,P2:0,P3:0,D1:0,D2:0,D3:0,E1:3,E2:0,E3:0,R1:3,R2:0,R3:1,S1:1,S2:0,S3:0}},
  {t:"感觉到了不耐烦，默默记住以后别问这人",s:{P1:2,P2:3,P3:2,D1:2,D2:1,D3:0,E1:1,E2:2,E3:2,R1:0,R2:2,R3:0,S1:2,S2:0,S3:0}}
 ]},
{cat:"work",catN:"职场暗语",
 scene:"年底谈话，领导说：",
 quote:"你今年进步很大，明年对你有更高的期望。",
 ask:"你心里在想什么？",
 opts:[
  {t:"太好了，升职加薪有望！",s:{P1:0,P2:0,P3:0,D1:0,D2:0,D3:3,E1:3,E2:0,E3:0,R1:0,R2:0,R3:0,S1:0,S2:0,S3:0}},
  {t:"翻译：今年不够好，明年得更卖命",s:{P1:3,P2:2,P3:3,D1:3,D2:2,D3:0,E1:1,E2:0,E3:1,R1:0,R2:0,R3:0,S1:3,S2:0,S3:0}},
  {t:"不管真假，先说「谢谢领导栽培」准没错",s:{P1:2,P2:1,P3:1,D1:1,D2:1,D3:0,E1:2,E2:0,E3:0,R1:0,R2:3,R3:0,S1:2,S2:0,S3:0}},
  {t:"听完回去焦虑一晚上：到底是表扬还是警告？",s:{P1:2,P2:2,P3:2,D1:2,D2:3,D3:1,E1:0,E2:1,E3:3,R1:0,R2:0,R3:0,S1:2,S2:0,S3:0}}
 ]},
{cat:"work",catN:"职场暗语",
 scene:"你申请调部门，HR说：",
 quote:"目前那边编制比较紧张，你先安心做好现在的工作。",
 ask:"你的解读是？",
 opts:[
  {t:"编制确实满了，等着就好",s:{P1:0,P2:0,P3:0,D1:0,D2:0,D3:2,E1:3,E2:0,E3:0,R1:0,R2:0,R3:0,S1:0,S2:0,S3:0}},
  {t:"「安心」两个字就是让我别想了",s:{P1:3,P2:2,P3:3,D1:3,D2:1,D3:0,E1:2,E2:0,E3:0,R1:0,R2:0,R3:0,S1:3,S2:0,S3:0}},
  {t:"心里明白被拒了，但表面说「好的了解」",s:{P1:3,P2:2,P3:2,D1:2,D2:1,D3:0,E1:2,E2:0,E3:0,R1:0,R2:3,R3:0,S1:3,S2:0,S3:0}},
  {t:"直接问：「大概什么时候会有空位？」",s:{P1:2,P2:1,P3:2,D1:2,D2:0,D3:0,E1:2,E2:0,E3:0,R1:3,R2:0,R3:2,S1:2,S2:0,S3:0}}
 ]},
{cat:"work",catN:"职场暗语",
 scene:"开会讨论你的方案，领导突然说：",
 quote:"大家怎么看？都说说。",
 ask:"你觉得接下来会发生什么？",
 opts:[
  {t:"大家会各抒己见，民主讨论",s:{P1:0,P2:0,P3:0,D1:0,D2:0,D3:2,E1:3,E2:0,E3:0,R1:0,R2:0,R3:0,S1:0,S2:0,S3:0}},
  {t:"有人会出来唱反调，领导在借刀杀人",s:{P1:3,P2:2,P3:3,D1:3,D2:3,D3:0,E1:1,E2:1,E3:1,R1:0,R2:0,R3:0,S1:3,S2:0,S3:0}},
  {t:"赶紧找盟友使眼色，让他们帮忙说好话",s:{P1:3,P2:3,P3:2,D1:2,D2:2,D3:0,E1:1,E2:0,E3:0,R1:0,R2:2,R3:0,S1:3,S2:0,S3:0}},
  {t:"无所谓，方案好就行，怕什么讨论",s:{P1:1,P2:0,P3:0,D1:1,D2:0,D3:1,E1:3,E2:0,E3:0,R1:2,R2:0,R3:1,S1:1,S2:0,S3:0}}
 ]},
{cat:"work",catN:"职场暗语",
 scene:"你加班到很晚，领导发微信：",
 quote:"注意身体，别太晚了啊。",
 ask:"你的反应是？",
 opts:[
  {t:"暖心！领导是真的关心我",s:{P1:0,P2:0,P3:0,D1:0,D2:0,D3:2,E1:3,E2:2,E3:0,R1:0,R2:0,R3:0,S1:0,S2:0,S3:0}},
  {t:"翻译：我知道你在加班，很好，继续",s:{P1:3,P2:2,P3:2,D1:3,D2:1,D3:0,E1:1,E2:0,E3:1,R1:0,R2:0,R3:0,S1:3,S2:0,S3:0}},
  {t:"回一句「快了快了」然后加班到更晚",s:{P1:1,P2:1,P3:1,D1:1,D2:0,D3:0,E1:2,E2:0,E3:0,R1:0,R2:2,R3:0,S1:1,S2:0,S3:0}},
  {t:"想回「你也注意身体，别太晚发消息了」但忍住了",s:{P1:3,P2:2,P3:2,D1:2,D2:2,D3:0,E1:1,E2:0,E3:0,R1:1,R2:1,R3:3,S1:2,S2:0,S3:0}}
 ]},
{cat:"work",catN:"职场暗语",
 scene:"领导在工作群发消息：",
 quote:"最近几个项目质量参差不齐，大家反思一下。",
 ask:"你看到这条消息的感受？",
 opts:[
  {t:"跟我没关系，我项目做得挺好的",s:{P1:0,P2:0,P3:0,D1:0,D2:0,D3:1,E1:3,E2:0,E3:0,R1:0,R2:0,R3:0,S1:0,S2:0,S3:0}},
  {t:"知道是说谁的，但装作不知道",s:{P1:3,P2:2,P3:2,D1:3,D2:2,D3:0,E1:2,E2:1,E3:0,R1:0,R2:3,R3:0,S1:3,S2:0,S3:0}},
  {t:"开始紧张，回忆自己的项目有没有问题",s:{P1:1,P2:1,P3:1,D1:1,D2:1,D3:2,E1:0,E2:1,E3:3,R1:0,R2:0,R3:0,S1:1,S2:0,S3:0}},
  {t:"在群里第一个回「收到，会注意」争取表现",s:{P1:2,P2:1,P3:1,D1:1,D2:1,D3:0,E1:2,E2:0,E3:1,R1:0,R2:2,R3:0,S1:2,S2:0,S3:0}}
 ]},
{cat:"work",catN:"职场暗语",
 scene:"你想请假，领导说：",
 quote:"行吧，你自己安排好就行。",

// ===== STATE =====
let cur = 0, ans = new Array(Q.length).fill(null);

function showPg(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('pg-'+id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}
function startQuiz(){cur=0;ans=new Array(Q.length).fill(null);showPg('quiz');renderQ()}

function renderQ(){
  const q=Q[cur],a=document.getElementById('q-area');
  const catCls={work:'cat-work',love:'cat-love',family:'cat-family',social:'cat-social'}[q.cat]||'';
  let oh=q.opts.map((o,i)=>`<button class="opt${ans[cur]===i?' sel':''}" onclick="selOpt(${i})">${String.fromCharCode(65+i)}. ${o.t}</button>`).join('');
  a.innerHTML=`<div class="q-card"><span class="q-cat ${catCls}">${q.catN}</span><div class="q-scene">${q.scene}</div><div class="q-quote">"${q.quote}"</div><div class="q-ask">${q.ask}</div><div class="opts">${oh}</div></div>`;
  document.getElementById('p-num').textContent=`${cur+1}/${Q.length}`;
  document.getElementById('p-fill').style.width=`${((cur+1)/Q.length)*100}%`;
  document.getElementById('p-cat').textContent=q.catN;
  document.getElementById('nb-prev').disabled=cur===0;
  const nb=document.getElementById('nb-next');
  if(cur===Q.length-1&&ans[cur]!==null){nb.textContent='查看结果';nb.disabled=false}
  else{nb.textContent='下一题';nb.disabled=ans[cur]===null}
}

function selOpt(i){ans[cur]=i;renderQ()}
function nextQ(){if(cur===Q.length-1&&ans[cur]!==null){showResults();return}if(cur<Q.length-1&&ans[cur]!==null){cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'})}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'})}}

function showResults(){
  // Calculate dimension scores
  const dimScores={};DIMS.forEach(d=>dimScores[d]=0);
  const dimMax={};DIMS.forEach(d=>dimMax[d]=0);
  Q.forEach((q,i)=>{if(ans[i]!==null){const s=q.opts[ans[i]].s;DIMS.forEach(d=>{dimScores[d]+=s[d]||0;dimMax[d]+=3})}});
  // Normalize to 0-100
  const dimPct={};DIMS.forEach(d=>dimPct[d]=dimMax[d]>0?Math.round((dimScores[d]/dimMax[d])*100):0);

  // Match personality type
  let bestType=null,bestScore=-Infinity;
  for(let code in TYPE_MATCH){
    let score=0;
    DIMS.forEach(d=>{score+=TYPE_MATCH[code][d]*(dimPct[d]/100)});
    if(score>bestScore){bestScore=score;bestType=code}
  }
  const prof=TYPES[bestType];

  // Model scores (avg of 3 dims each)
  const modelScores=MODEL_INFO.map(m=>{
    const avg=Math.round(m.dims.reduce((a,d)=>a+dimPct[d],0)/m.dims.length);
    return{...m,score:avg}
  });

  // Render
  const area=document.getElementById('r-area');
  area.innerHTML=`
    <div class="r-hero">
      <span class="r-emoji">${prof.emoji}</span>
      <div class="r-badge">${prof.code}</div>
      <div class="r-title">${prof.name}</div>
      <div class="r-sub">${prof.quote}</div>
      <div class="r-rare">${prof.rare}</div>
    </div>

    <div class="r-card">
      <h3>你的弦外之音人格</h3>
      <p>${prof.desc}</p>
      <div class="tags">${prof.traits.map(t=>`<span class="tag-item">#${t}</span>`).join('')}</div>
    </div>

    <div class="r-card">
      <h3>五大模型</h3>
      ${modelScores.map(m=>`<div class="model-row">
        <div class="model-icon">${m.icon}</div>
        <div class="model-info"><div class="model-name">${m.name}</div><div class="model-desc">${m.desc}</div></div>
        <div style="min-width:36px;text-align:right;font-size:13px;font-weight:700;color:var(--primary)">${m.score}%</div>
        <div class="model-bar"><div class="model-fill" style="width:${m.score}%;background:linear-gradient(90deg,var(--primary),var(--accent))"></div></div>
      </div>`).join('')}
    </div>

    <div class="r-card">
      <h3>15 维度详情</h3>
      ${DIMS.map(d=>`<div class="dim-group">
        <div class="dim-label"><span>${DIM_NAMES[d]}</span><span>${dimPct[d]}%</span></div>
        <div class="dim-track"><div class="dim-fill" style="width:${dimPct[d]}%;background:${dimPct[d]>66?'var(--green)':dimPct[d]>33?'var(--primary)':'var(--red)'}"></div></div>
      </div>`).join('')}
    </div>

    <button class="btn" onclick="shareResult('${bestType}')">分享我的结果</button>
    <button class="btn-outline" onclick="restart()">重新测试</button>
  `;
  showPg('result');
}

function shareResult(code){
  const p=TYPES[code];
  const t=`👂 我的弦外之音人格：${p.code}（${p.name}）\n"${p.quote}"\n${p.rare}\n\n你也来测测？`;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>showToast('已复制到剪贴板！')).catch(()=>showToast('复制失败'))}
  else{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已复制到剪贴板！')}
}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function restart(){cur=0;ans=new Array(Q.length).fill(null);showPg('intro')}

document.addEventListener('keydown',e=>{
  if(document.getElementById('pg-quiz').classList.contains('active')){
    if(e.key>='1'&&e.key<='4'){const i=parseInt(e.key)-1;if(i<Q[cur].opts.length)selOpt(i)}
    if(e.key==='ArrowRight'||e.key==='Enter')nextQ();
    if(e.key==='ArrowLeft')prevQ()
  }
  if(e.key==='Enter'&&document.getElementById('pg-intro').classList.contains('active'))startQuiz()
});
</script>
</body>
