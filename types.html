<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16 种弦外之音人格 · 总览</title>
<style>
:root {
  --bg: #0a0a0f;
  --card: #15151e;
  --card2: #1c1c2a;
  --primary: #a78bfa;
  --accent: #f472b6;
  --accent2: #fb923c;
  --green: #34d399;
  --red: #f87171;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --border: #2a2a3d;
  --radius: 16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--primary);text-decoration:none}
.container{max-width:760px;margin:0 auto;padding:20px 16px 60px}

/* Header */
.hdr{text-align:center;padding:40px 0 32px}
.hdr .logo{font-size:48px;display:block;margin-bottom:8px}
.hdr h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.hdr p{font-size:14px;color:var(--text2);line-height:1.6;max-width:520px;margin:0 auto 20px}
.hdr .btn{display:inline-block;padding:12px 32px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--primary),var(--accent));border:none;border-radius:12px;cursor:pointer;text-decoration:none;transition:all .2s}
.hdr .btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(167,139,250,.25)}

/* Stats bar */
.stats{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap}
.stat-item{flex:1;min-width:100px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center}
.stat-num{font-size:24px;font-weight:900;color:var(--primary);display:block}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}

/* Filter */
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.fbtn{padding:6px 14px;font-size:12px;font-weight:600;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit}
.fbtn:hover,.fbtn.active{border-color:var(--primary);color:var(--primary);background:rgba(167,139,250,.08)}

/* Cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:32px}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;cursor:pointer;position:relative}
.p-card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 8px 24px rgba(167,139,250,.12)}
.p-top{padding:20px 16px 12px;text-align:center}
.p-emoji{font-size:40px;display:block;margin-bottom:8px}
.p-code{font-size:18px;font-weight:900;letter-spacing:3px;color:var(--text);margin-bottom:2px}
.p-name{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:6px}
.p-quote{font-size:12px;color:var(--text2);line-height:1.5;font-style:italic}
.p-foot{padding:8px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.p-rare{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.rare-common{background:rgba(148,163,184,.1);color:var(--text2)}
.rare-uncommon{background:rgba(167,139,250,.1);color:var(--primary)}
.rare-rare{background:rgba(244,114,182,.1);color:var(--accent)}
.rare-epic{background:rgba(251,146,60,.12);color:var(--accent2)}
.p-arrow{font-size:12px;color:var(--text2)}

/* Detail modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);max-width:580px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:12px;right:14px;font-size:20px;color:var(--text2);cursor:pointer;background:none;border:none;z-index:10;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.modal-close:hover{background:var(--card);color:var(--text)}
.m-hero{text-align:center;padding:32px 20px 16px}
.m-emoji{font-size:56px;display:block;margin-bottom:8px}
.m-badge{display:inline-block;padding:8px 24px;border-radius:20px;font-size:24px;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;margin-bottom:8px}
.m-title{font-size:18px;font-weight:900;margin-bottom:4px}
.m-quote{font-size:13px;color:var(--text2);font-style:italic;margin-bottom:6px}
.m-rare{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-bottom:16px}
.m-section{padding:0 20px 20px}
.m-section h3{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:10px;padding-top:16px;border-top:1px solid var(--border)}
.m-section p{font-size:13px;line-height:1.8;color:var(--text2);margin-bottom:10px}
.m-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.m-tag{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:600;background:rgba(167,139,250,.12);color:var(--primary)}

/* Strengths / Weaknesses */
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sw-box{padding:12px;border-radius:10px;border:1px solid var(--border)}
.sw-box h4{font-size:12px;font-weight:700;margin-bottom:6px}
.sw-box.str h4{color:var(--green)}
.sw-box.wk h4{color:var(--red)}
.sw-box li{font-size:12px;color:var(--text2);line-height:1.6;list-style:none;padding-left:14px;position:relative}
.sw-box li::before{content:'';position:absolute;left:0;top:7px;width:5px;height:5px;border-radius:50%}
.sw-box.str li::before{background:var(--green)}
.sw-box.wk li::before{background:var(--red)}

/* Compatibility */
.compat{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.compat-tag{padding:4px 10px;border-radius:10px;font-size:11px;font-weight:600;border:1px solid var(--border)}
.compat-good{color:var(--green);border-color:rgba(52,211,153,.3)}
.compat-bad{color:var(--red);border-color:rgba(248,113,113,.3)}

.m-cta{display:block;width:calc(100% - 40px);margin:0 20px 20px;padding:14px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--primary),var(--accent));border:none;border-radius:12px;cursor:pointer;text-align:center;text-decoration:none;font-family:inherit}
.m-cta:hover{box-shadow:0 6px 20px rgba(167,139,250,.25)}

@media(max-width:480px){
  .hdr h1{font-size:22px}
  .grid{grid-template-columns:1fr}
  .sw-grid{grid-template-columns:1fr}
  .m-badge{font-size:20px}
}
</style>
</head>

// Render cards
function renderCards(filter){
  const grid=document.getElementById('card-grid');
  const list=filter==='all'?TYPES:TYPES.filter(t=>t.rarity===filter);
  grid.innerHTML=list.map(t=>`
    <div class="p-card" onclick="openModal('${t.code}')">
      <div class="p-top">
        <span class="p-emoji">${t.emoji}</span>
        <div class="p-code">${t.code}</div>
        <div class="p-name">${t.name}</div>
        <div class="p-quote">"${t.quote}"</div>
      </div>
      <div class="p-foot">
        <span class="p-rare ${t.rareClass}">${t.rareLabel} · ${t.rarePct}</span>
        <span class="p-arrow">查看详情 →</span>
      </div>
    </div>
  `).join('');
}

function filterCards(f){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderCards(f);
}

function openModal(code){
  const t=TYPES.find(x=>x.code===code);
  if(!t)return;
  const m=document.getElementById('modal-content');
  m.innerHTML=`
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="m-hero">
      <span class="m-emoji">${t.emoji}</span>
      <div class="m-badge">${t.code}</div>
      <div class="m-title">${t.name}</div>
      <div class="m-quote">"${t.quote}"</div>
      <span class="m-rare ${t.rareClass}">${t.rareLabel} · ${t.rarePct}</span>
    </div>
    <div class="m-section">
      <h3>人格画像</h3>
      <p>${t.desc}</p>
      <div class="m-tags">${t.traits.map(x=>`<span class="m-tag">#${x}</span>`).join('')}</div>
    </div>
    <div class="m-section">
      <h3>优势与短板</h3>
      <div class="sw-grid">
        <div class="sw-box str"><h4>优势</h4><ul>${t.strengths.map(x=>`<li>${x}</li>`).join('')}</ul></div>
        <div class="sw-box wk"><h4>短板</h4><ul>${t.weaknesses.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      </div>
    </div>
    <div class="m-section">
      <h3>维度特征</h3>
      <p style="font-size:12px;color:var(--accent)">${t.dimHighlight}</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">
        <span class="m-tag">感知：${t.model.perception}</span>
        <span class="m-tag">解码：${t.model.decode}</span>
        <span class="m-tag">情绪：${t.model.emotion}</span>
        <span class="m-tag">应对：${t.model.response}</span>
        <span class="m-tag">场景：${t.model.scene}</span>
      </div>
    </div>
    <div class="m-section">
      <h3>人格关系</h3>
      <div class="compat">
        ${t.bestMatch.map(x=>`<span class="compat-tag compat-good">❤️ ${x}</span>`).join('')}
        ${t.worstMatch.map(x=>`<span class="compat-tag compat-bad">⚡ ${x}</span>`).join('')}
      </div>
      <p style="font-size:11px;color:var(--text2)">❤️ = 最佳搭配 &nbsp; ⚡ = 容易冲突</p>
    </div>
    <div class="m-section">
      <h3>给你的一句话</h3>
      <p style="font-style:italic;color:var(--accent)">"${t.advice}"</p>
    </div>
    <a class="m-cta" href="index.html">测测你是哪种人格</a>
  `;
  document.getElementById('modal-bg').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-bg').classList.remove('show');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// Init
renderCards('all');
